<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSync AI | Smart Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-green: #2d6a4f;
            --soft-cream: #f8f9fa;
            --deep-forest: #1b4332;
        }
        body {
            font-family: 'Outfit', 'Noto Sans Bengali', sans-serif;
            background: #f0f4f0; /* হালকা সতেজ ব্যাকগ্রাউন্ড */
            background-image: radial-gradient(#d8f3dc 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .chat-container {
            max-width: 850px;
            margin: 50px auto;
            padding: 20px;
        }
        /* AI Response Box */
        .ai-response {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e0eadd;
            margin-bottom: 30px;
            line-height: 1.8;
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Floating Input Bar (Gemini Style) */
        .input-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 750px;
            background: white;
            border-radius: 50px;
            padding: 10px 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            border: 1px solid #d8f3dc;
        }
        input[type="text"] {
            border: none;
            width: 100%;
            padding: 12px;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            background: var(--nature-green);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .send-btn:hover { background: var(--deep-forest); transform: scale(1.1); }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-weight: 700; color: var(--deep-forest); }
        
        .credit-footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header-section">
        <h1>🌿 TaskForge AI</h1>
        <p class="text-muted">I am helping to keep your work fresh and well-organized.
</p>
    </div>

    {% if response %}
    <div class="ai-response">
        <h5 class="mb-3" style="color: var(--nature-green);"><b>Analysis:</b> {{ task }}</h5>
        <hr>
        <div>{{ response | safe }}</div>
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger" style="border-radius: 15px;">{{ error }}</div>
    {% endif %}

    <div class="credit-footer">
        Project By: <b>Md Sagur Ali</b> <br>
        N Islam Institute of Science & Technology
    </div>
</div>

<form action="/ask" method="post" class="input-area">
    <input type="text" name="task" placeholder="Please write your next task or question.
..." required autocomplete="off">
    <button type="submit" class="send-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.001.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
        </svg>
    </button>
</form>

</body>
</html>
